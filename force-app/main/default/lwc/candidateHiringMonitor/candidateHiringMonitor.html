<template>
    <lightning-card title="Hiring Pipeline Monitor" icon-name="standard:people">
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                title="Refresh"
                onclick={handleRefresh}
            ></lightning-button-icon>
        </div>

        <template if:true={hasSnapshot}>
            <div class="slds-p-horizontal_medium slds-p-top_small slds-p-bottom_small">
                <p class="slds-text-body_small slds-text-color_weak">Last refreshed: {generatedText}</p>
            </div>

            <div class="slds-grid slds-wrap slds-gutters slds-p-horizontal_medium slds-p-bottom_medium">
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                    <div class="metric-box">
                        <div class="metric-label">Pending Compliance</div>
                        <div class="metric-value">{snapshot.totalPendingCompliance}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                    <div class="metric-box metric-box_warn">
                        <div class="metric-label">Ready But Pending</div>
                        <div class="metric-value">{snapshot.readyButStillPending}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                    <div class="metric-box metric-box_error">
                        <div class="metric-label">Pending Missing Employee</div>
                        <div class="metric-value">{snapshot.pendingMissingEmployee}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                    <div class="metric-box metric-box_warn">
                        <div class="metric-label">Aging &gt; 3 Days</div>
                        <div class="metric-value">{snapshot.agingPendingOver3Days}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                    <div class="metric-box">
                        <div class="metric-label">Converted Last 7 Days</div>
                        <div class="metric-value">{snapshot.convertedLast7Days}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                    <div class="metric-box">
                        <div class="metric-label">Hired Last 7 Days</div>
                        <div class="metric-value">{snapshot.hiredLast7Days}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                    <div class="metric-box">
                        <div class="metric-label">Avg Pending Age (Days)</div>
                        <div class="metric-value">{averageAgeText}</div>
                    </div>
                </div>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <h3 class="slds-text-title_bold slds-m-bottom_x-small">Ready To Promote But Still Pending</h3>
                <lightning-datatable
                    key-field="candidateId"
                    data={snapshot.readyQueue}
                    columns={rowColumns}
                    hide-checkbox-column
                ></lightning-datatable>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <h3 class="slds-text-title_bold slds-m-bottom_x-small">Pending Missing Employee Link</h3>
                <lightning-datatable
                    key-field="candidateId"
                    data={snapshot.missingEmployeeQueue}
                    columns={rowColumns}
                    hide-checkbox-column
                ></lightning-datatable>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <h3 class="slds-text-title_bold slds-m-bottom_x-small">Oldest Pending Compliance</h3>
                <lightning-datatable
                    key-field="candidateId"
                    data={snapshot.oldestPendingQueue}
                    columns={rowColumns}
                    hide-checkbox-column
                ></lightning-datatable>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-p-around_medium slds-text-color_error">{errorMessage}</div>
        </template>
    </lightning-card>
</template>
