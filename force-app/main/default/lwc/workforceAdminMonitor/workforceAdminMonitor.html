<template>
    <lightning-card title="Workforce Monitor" icon-name="standard:shift">
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                title="Refresh"
                onclick={handleRefresh}
            ></lightning-button-icon>
        </div>

        <template if:true={hasSnapshot}>
            <div class="slds-p-horizontal_medium slds-p-top_small slds-p-bottom_small">
                <p class="slds-text-body_small slds-text-color_weak">Last refreshed: {generatedText}</p>
            </div>

            <div class="slds-grid slds-wrap slds-gutters slds-p-horizontal_medium slds-p-bottom_medium">
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                    <div class="metric-box">
                        <div class="metric-label">Active Templates</div>
                        <div class="metric-value">{snapshot.activeTemplates}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                    <div class="metric-box metric-box_warn">
                        <div class="metric-label">Scheduled Shifts</div>
                        <div class="metric-value">{snapshot.scheduledAssignments}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                    <div class="metric-box">
                        <div class="metric-label">Upcoming 7 Days</div>
                        <div class="metric-value">{snapshot.upcomingAssignments7Days}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                    <div class="metric-box metric-box_error">
                        <div class="metric-label">Attendance Anomalies</div>
                        <div class="metric-value">{snapshot.attendanceAnomalies}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                    <div class="metric-box metric-box_warn">
                        <div class="metric-label">Late Check-ins (7d)</div>
                        <div class="metric-value">{snapshot.lateCheckins7Days}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                    <div class="metric-box">
                        <div class="metric-label">Leave Submitted</div>
                        <div class="metric-value">{snapshot.leaveSubmitted}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                    <div class="metric-box">
                        <div class="metric-label">Leave Approved</div>
                        <div class="metric-value">{snapshot.leaveApproved}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                    <div class="metric-box">
                        <div class="metric-label">Leave Rejected</div>
                        <div class="metric-value">{snapshot.leaveRejected}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                    <div class="metric-box">
                        <div class="metric-label">Open Case Assignments</div>
                        <div class="metric-value">{snapshot.openCaseAssignments}</div>
                    </div>
                </div>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <h3 class="slds-text-title_bold slds-m-bottom_x-small">Scheduled Shifts</h3>
                <lightning-datatable
                    key-field="shiftId"
                    data={snapshot.scheduledShiftQueue}
                    columns={shiftColumns}
                    hide-checkbox-column
                ></lightning-datatable>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <h3 class="slds-text-title_bold slds-m-bottom_x-small">Attendance Exceptions</h3>
                <lightning-datatable
                    key-field="attendanceId"
                    data={snapshot.attendanceExceptions}
                    columns={attendanceColumns}
                    hide-checkbox-column
                ></lightning-datatable>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <h3 class="slds-text-title_bold slds-m-bottom_x-small">Pending Leave Approvals</h3>
                <lightning-datatable
                    key-field="leaveId"
                    data={snapshot.pendingLeaveQueue}
                    columns={leaveColumns}
                    hide-checkbox-column
                ></lightning-datatable>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-p-around_medium slds-text-color_error">{errorMessage}</div>
        </template>
    </lightning-card>
</template>
