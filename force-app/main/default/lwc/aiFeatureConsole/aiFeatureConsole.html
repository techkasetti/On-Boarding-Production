<template>

    <lightning-card title="AI Features">

        <!-- Top Right Button -->

        <div class="slds-p-horizontal_medium slds-text-align_right">
            <lightning-button
                label="New Feature"
                variant="brand"
                onclick={openModal}>
            </lightning-button>
        </div>

        <!-- Feature List -->

        <template if:true={features}>

            <div class="slds-p-around_medium">

                <template for:each={features} for:item="feature">

                    <div key={feature.Id}
                         class="slds-grid slds-p-around_small slds-border_bottom">

                        <div class="slds-col slds-size_8-of-12">

                            <div class="slds-text-heading_small">
                                {feature.Name__c}
                            </div>

                            <div class="slds-text-body_small slds-text-color_weak">
                                {feature.Description__c}
                            </div>

                        </div>

                        <div class="slds-col slds-size_4-of-12 slds-text-align_right">

                            <lightning-input
                                type="toggle"
                                data-id={feature.Id}
                                checked={feature.IsActive__c}
                                onchange={handleToggle}>
                            </lightning-input>

                        </div>

                    </div>

                </template>

            </div>

        </template>

    </lightning-card>

    <!-- Modal -->

    <template if:true={showModal}>

        <section role="dialog" class="slds-modal slds-fade-in-open">

            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">New Feature</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-input
                        label="Feature Name"
                        value={name}
                        onchange={handleName}>
                    </lightning-input>

                    <lightning-input
                        label="Description"
                        value={description}
                        onchange={handleDescription}>
                    </lightning-input>

                </div>

                <footer class="slds-modal__footer">

                    <lightning-button
                        label="Cancel"
                        onclick={closeModal}>
                    </lightning-button>

                    <lightning-button
                        label="Create"
                        variant="brand"
                        onclick={createFeature}>
                    </lightning-button>

                </footer>

            </div>

        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>

    </template>

</template>
